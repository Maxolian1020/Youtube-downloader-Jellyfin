name: Build Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore jellyfin-spotify/Jellyfin.Plugin.SpotifyDownloader/Jellyfin.Plugin.SpotifyDownloader.csproj
      
      - name: Build
        run: dotnet build jellyfin-spotify/Jellyfin.Plugin.SpotifyDownloader/Jellyfin.Plugin.SpotifyDownloader.csproj --configuration Release --no-restore
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dll
          path: jellyfin-spotify/Jellyfin.Plugin.SpotifyDownloader/bin/Release/net9.0/Jellyfin.Plugin.SpotifyDownloader.dll
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: jellyfin-spotify/Jellyfin.Plugin.SpotifyDownloader/bin/Release/net9.0/Jellyfin.Plugin.SpotifyDownloader.dll
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
